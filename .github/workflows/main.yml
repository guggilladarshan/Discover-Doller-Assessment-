name: Deploy to EC2 (Self-hosted)

on:
  push:
    branches:
      - main  # change if your branch is different

jobs:
  deploy:
    runs-on: self-hosted   # VERY IMPORTANT (your EC2 runner)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop existing containers
        run: |
          docker-compose down || true

      - name: Remove old images (optional)
        run: |
          docker system prune -af || true

      - name: Build backend image
        run: |
            cd backend
            sudo docker build -t backend-image .
      - name: Build frontend images
        run: |
            cd frontend
            sudo docker build -t frontend-image .
      - name: Start containers
        run: |
          sudo docker-compose up -d

      - name: Verify running containers
        run: |
          docker ps
